<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualités IA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #actus-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .actu-card {
      background: #111b2e;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .actu-card h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .actu-card p {
      color: #aab4c7;
    }
  </style>
</head>

<body>

  <h1>Actualités IA</h1>

  <!-- 🔥 CONTENEUR IMPORTANT -->
  <div id="actus-container"></div>

  <!-- 🔥 CHARGEMENT DU FICHIER ACTUALITES -->
  <script src="actualites.js"></script>

  <!-- 🔥 SCRIPT QUI AFFICHE -->
  <script>
    const container = document.getElementById("actus-container");

    if (window.ACTUALITES && container) {
      container.innerHTML = window.ACTUALITES.map(actu => `
        <div class="actu-card">
          <h2>${actu.title}</h2>
          <p>${actu.excerpt}</p>
        </div>
      `).join('');
    } else {
      container.innerHTML = "<p>Aucune actualité disponible.</p>";
    }
  </script>

</body>
</html>
